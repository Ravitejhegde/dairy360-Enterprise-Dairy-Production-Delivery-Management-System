<h1>Products</h1>
<h2>Add Product</h2>

<input
  type="text"
  placeholder="Product Name"
  [(ngModel)]="newProductName">

<br><br>

<input
  type="number"
  placeholder="Price"
  [(ngModel)]="newProductPrice">

<br><br>

<input
  type="number"
  placeholder="Quantity"
  [(ngModel)]="newProductQuantity">

<br><br>

<button (click)="addProduct()">
  Add Product
</button>

<hr>

<table>

  <tr>
    <th>Product</th>
    <th>Price</th>
    <th>Available</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let product of products; let index = index">

    <td>{{ product.productName }}</td>

    <td>₹{{ product.unitPrice }}</td>

    <td>{{ product.availableQuantity }}</td>

    <td>
      <button (click)="deleteProduct(index)">
        Delete
      </button>

  </tr>

</table>
