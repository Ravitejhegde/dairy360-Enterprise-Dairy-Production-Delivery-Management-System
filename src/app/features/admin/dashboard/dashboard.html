<div class="dashboard-container">

  <h1>Dairy360 Dashboard</h1>

  <div class="dashboard-cards">

    <div class="card">
      <h3>Customers</h3>
      <p>{{ customerCount }}</p>
    </div>

    <div class="card">
      <h3>Orders</h3>
      <p>{{ todayOrderCount }}</p>
    </div>

    <div class="card">
      <h3>Production</h3>
      <p>{{ dailyMilkProductionLiters }} L</p>
    </div>

    <div class="card">
      <h3>Revenue</h3>
      <p>₹{{ todayRevenueAmount }}</p>
    </div>

  </div>

</div>
